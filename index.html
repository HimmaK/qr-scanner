<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="text-align:center;font-family:Arial;background:#111;color:white;">

<h2>🎟️ QR Scanner</h2>
<button onclick="startScanner()">Start Scanner</button>

<div id="reader" style="width:300px;margin:auto;margin-top:20px;"></div>

<h2 id="result">Waiting...</h2>

<script>
let scanned = false;
let html5QrCode;

function startScanner() {

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },

    (decodedText) => {

      if (scanned) return;
      scanned = true;

      document.getElementById("result").innerHTML = "Processing...";

      // 🔐 Send secure request
      fetch(decodedText + "&scanner=HIMMA")
        .then(res => res.text())
        .then(data => {

          let parts = data.split("|");
          let status = parts[0];

          let content = "";

          if (status === "ENTRY_ALLOWED") {
            document.body.style.background = "green";

            content =
              "✅ Entry Allowed<br><br>" +
              "🎟️ Ticket: " + parts[1] + "<br>" +
              "👤 Name: " + parts[2] + "<br><br>" +
              "👥 Total Entries: " + parts[3];
          }
          else if (status === "ALREADY_USED") {
            document.body.style.background = "red";

            content =
              "❌ Already Used<br><br>" +
              "🎟️ Ticket: " + parts[1] + "<br>" +
              "👤 Name: " + parts[2] + "<br><br>"
              "👥 Total Entries: " + parts[3];
          }
          else if (status === "INVALID") {
            document.body.style.background = "red";
            content = "❌ Invalid Ticket";
          }
          else {
            document.body.style.background = "red";
            content = "❌ Unauthorized";
          }

          // 👉 Show message + OK button
          document.getElementById("result").innerHTML =
            content +
            "<br><br><button onclick='resetScanner()' style='padding:12px 25px;font-size:16px;border-radius:8px;'>OK</button>";

        })
        .catch(err => {
          console.log(err);
          document.getElementById("result").innerHTML = "Error occurred";
        });

    },

    (errorMessage) => {
      // ignore scanning errors
    }

  ).catch(err => {
    console.log("Camera start error:", err);
  });
}

// 👉 Reset function (for OK button)
function resetScanner() {
  scanned = false;
  document.body.style.background = "#111";
  document.getElementById("result").innerHTML = "Ready for next scan";
}
</script>

</body>
</html>
