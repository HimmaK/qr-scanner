<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="text-align:center;font-family:Arial;background:#111;color:white;">

<h2>🎟️ QR Scanner</h2>
<button onclick="startScanner()">Start Scanner</button>

<div id="reader" style="width:300px;margin:auto;margin-top:20px;"></div>

<h2 id="result">Waiting...</h2>

<script>
let scanned = false;
let html5QrCode;

function startScanner() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      if (scanned) return;
      scanned = true;

      // 🔐 Send secure request
      fetch(decodedText + "&scanner=HIMMA")
        .then(res => res.text())
        .then(data => {

          document.getElementById("result").innerHTML = data;

          if (data.includes("Allowed")) {
            document.body.style.background = "green";
          } else {
            document.body.style.background = "red";
          }

          // 🔄 Reset after 3 seconds
          setTimeout(() => {
            scanned = false;
            document.body.style.background = "#111";
            document.getElementById("result").innerHTML = "Ready for next scan";
          }, 3000);
        });

    }
  ).catch(err => {
    console.log(err);
  });
}
</script>


</body>
</html>
